
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Family NOW Gauteng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Global Theme Transition */
    * { transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease; }

    /* Theme Variable Definitions */
    :root {
      --bg-primary: #f9fafb;
      --bg-secondary: #ffffff;
      --bg-header: rgba(249, 250, 251, 0.8);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --border-primary: #e5e7eb;
      --accent-primary: #059669;
      --accent-secondary: #10b981;
    }

    .dark {
      --bg-primary: #0A0C10; /* Deep Navy-Black */
      --bg-secondary: #121212; /* UI Surface Graphite */
      --bg-header: rgba(10, 12, 16, 0.95);
      --text-primary: #F9FAFB;
      --text-secondary: #94A3B8;
      --border-primary: #22324A; /* Slate Blue Steel */
      --accent-primary: #66FF66; /* Luminous Tech Green */
      --accent-secondary: #E6E6E6; /* UI Surface Soft Grey */
    }

    .bg-space {
      background-image: url('https://storage.googleapis.com/multimodal-toolkit-permanent-blobs/2026/02/24/07/05/29/440590/input_file_1.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .pastel { 
      --bg-primary: #f0f7f4; 
      --bg-secondary: #ffffff;
      --bg-header: rgba(240, 247, 244, 0.8);
      --text-primary: #1a2e26; 
      --text-secondary: #3d5e50;
      --border-primary: #e2ede8;
      --accent-primary: #5ba388;
      --accent-secondary: #7bc4aa;
    }

    .amber { 
      --bg-primary: #fffaf0; 
      --bg-secondary: #ffffff;
      --bg-header: rgba(255, 250, 240, 0.8);
      --text-primary: #451a03; 
      --text-secondary: #92400e;
      --border-primary: #fef3c7;
      --accent-primary: #d97706;
      --accent-secondary: #f59e0b;
    }

    /* Helper Utility Classes */
    .bg-theme-primary { background-color: var(--bg-primary); }
    .bg-theme-secondary { background-color: var(--bg-secondary); }
    .bg-theme-header { background-color: var(--bg-header); }
    .text-theme-primary { color: var(--text-primary); }
    .text-theme-secondary { color: var(--text-secondary); }
    .border-theme-primary { border-color: var(--border-primary); }
    .text-theme-accent { color: var(--accent-primary); }
    .bg-theme-accent { background-color: var(--accent-primary); }

    /* Theme Card logic as per spec */
    .dark .bg-theme-card { background-color: #E6E6E6; color: #121212; }
    .bg-theme-card { background-color: var(--bg-secondary); color: var(--text-primary); }
  </style>
<script type="importmap">
{

  }
}
</script>

</head>

</html>
