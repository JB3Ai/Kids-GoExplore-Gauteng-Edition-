
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Family NOW Gauteng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Theme Transitions */
    * { transition: border-color 0.2s ease, background-color 0.2s ease; }

    /* Pastel Theme - Refined */
    .pastel { 
      background-color: #f0f7f4; 
      color: #2d4a3e; 
    }
    .pastel .bg-white { background-color: #ffffff; }
    .pastel .text-gray-900 { color: #1a2e26; }
    .pastel .text-gray-600 { color: #3d5e50; }
    .pastel .border-gray-100 { border-color: #e2ede8; }
    .pastel .bg-gray-50 { background-color: #f7faf9; }
    .pastel .bg-blue-600 { background-color: #5ba388; }
    .pastel .text-blue-600 { color: #4a8a71; }
    .pastel .from-indigo-600 { --tw-gradient-from: #5ba388; }
    .pastel .to-blue-500 { --tw-gradient-to: #7bc4aa; }

    /* Amber Theme - Refined */
    .amber { 
      background-color: #fffaf0; 
      color: #451a03; 
    }
    .amber .bg-white { background-color: #ffffff; }
    .amber .border-gray-100 { border-color: #fef3c7; }
    .amber .bg-blue-600 { background-color: #d97706; }
    
    .dark .bg-white { background-color: #111827; }
    .dark .text-gray-900 { color: #f9fafb; }
    .dark .border-gray-100 { border-color: #374151; }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
</body>
</html>
